name: release

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows:
      - tag-on-main-merge
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  publish:
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$REF_NAME"
          else
            tag=""
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download release tag artifact
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: release-tag

      - name: Finalize release tag
        id: finalize_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RESOLVED_TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            tag="$RESOLVED_TAG"
          elif [ -f release-tag.txt ]; then
            tag="$(cat release-tag.txt)"
          else
            tag=""
          fi

          if [ -z "$tag" ]; then
            echo "No release tag found for this workflow run; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.finalize_tag.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.finalize_tag.outputs.tag }}
          generate_release_notes: true
          make_latest: true